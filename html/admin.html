<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillBridge Admin Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center bg-gradient">

<div class="admin-card">
  <div class="text-center mb-4">
    <i class="bi bi-shield-lock-fill admin-icon"></i>
    <img src="../assets/logo.png" alt="SkillBridge Logo" class="logo">
    <h3 class="mt-2">Admin Access</h3>
    <p class="text-muted">Administrator login for SkillBridge</p>
  </div>

  <!-- Admin Login Form -->
  <form class="needs-validation" novalidate id="adminLoginForm">
    <div class="mb-3">
      <label for="adminEmail" class="form-label">Admin Email</label>
      <input type="email" class="form-control" id="adminEmail" required>
      <div class="invalid-feedback">Valid admin email required.</div>
    </div>
    <div class="mb-3">
      <label for="adminPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="adminPassword" required minlength="6">
      <div class="invalid-feedback">Password must be at least 6 characters.</div>
    </div>
    <div class="mb-3">
      <label for="adminCode" class="form-label">Admin Access Code</label>
      <input type="text" class="form-control" id="adminCode" required>
      <div class="invalid-feedback">Access code required.</div>
      <p class="note">This code is provided to authorized administrators only.</p>
    </div>
    <button type="submit" id="adminLoginBtn" class="btn-admin">Admin Sign In</button>
  </form>

  <!-- Footer -->
  <div class="footer-link">
  <a href="index.html">← Back to User Login</a>
  <p>© 2026 SkillBridge | <a href="help.html">Help</a></p>
</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="../js/validation.js"></script>
</body>
</html>
