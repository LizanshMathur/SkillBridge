<!DOCTYPE html>
<html lang="en" ng-app="skillBridgeApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillBridge Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
  
</head>
<body ng-controller="LoginController" class="bg-gradient d-flex align-items-center justify-content-center">

<div class="login-card">
  <!-- Logo + Heading -->
  <div class="text-center mb-4">
    <img src="../assets/logo.png" alt="SkillBridge Logo" class="logo">
    <h3>SkillBridge</h3>
    <p class="text-muted">Welcome back! Sign in to continue your journey.</p>
  </div>

  <!-- Login Form -->
  <form id="loginForm" ng-submit="login()" class="needs-validation" novalidate>
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input id="email" type="email" class="form-control" aria-label="Email address" required>
      <div class="invalid-feedback">Valid email is required.</div>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control" aria-label="Password" required>
      <div class="invalid-feedback">Password is required.</div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="rememberMe">
        <label class="form-check-label" for="rememberMe">Remember me</label>
      </div>
      <a href="#" class="text-decoration-none">Forgot password?</a>
    </div>
    <button type="submit" class="btn-skillbridge">Sign In</button>
  </form>

  <!-- Social Login -->
  <div class="text-center my-3">
    <p class="text-muted mb-2">Or continue with</p>
    <div class="d-flex justify-content-center gap-2">
      <button class="btn btn-outline-secondary w-50">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18" class="me-2"> Google
      </button>
      <button class="btn btn-outline-secondary w-50">
        <i class="bi bi-github me-2"></i> GitHub
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-link mt-4">
    <p>Don’t have an account? <a href="#!/register">Sign up</a></p>
    <p><a href="#!/help">Help</a></p>
    <p><a href="admin.html">Administrator Login</a></p>
    <p>© 2026 SkillBridge</p>
  </div>
</div>

<!-- Help Icon -->
<div style="position: fixed; bottom: 20px; right: 20px;">
  <button class="btn btn-light rounded-circle shadow-sm">?</button>
</div>

<!-- AngularJS + Bootstrap JS -->
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="../js/app.js"></script>
<script src="../js/validation.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function (event) {
  event.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('http://localhost:5000/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  if (res.ok) {
    alert('Login successful!');
    localStorage.setItem('token', data.token);
    window.location.href = 'dashboard.html';
  } else {
    alert(data.error);
  }
});
</script>

</body>
</html>
