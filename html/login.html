<!DOCTYPE html>
<html lang="en" ng-app="skillBridgeApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillBridge Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gradient d-flex align-items-center justify-content-center" ng-controller="LoginController">

<div class="login-card">
  <!-- Logo + Heading -->
  <div class="text-center mb-4">
    <img src="../assets/logo.png" alt="SkillBridge Logo" class="logo">
    <h3>SkillBridge</h3>
    <p class="text-muted">Welcome back! Sign in to continue your journey.</p>
  </div>

  <!-- Login Form -->
  <form class="needs-validation" novalidate ng-submit="login()">
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" ng-model="user.email" required>
      <div class="invalid-feedback">Valid email is required.</div>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" ng-model="user.password" required>
      <div class="invalid-feedback">Password is required.</div>
    </div>
    <button type="submit" class="btn-skillbridge">Sign In</button>
  </form>

  <!-- Footer -->
  <div class="footer-link mt-4">
    <p>Don’t have an account? <a href="#!/register">Sign up</a></p>
    <p><a href="#!/help">Help</a></p>
    <p>© 2026 SkillBridge</p>
  </div>
</div>

<!-- AngularJS + Bootstrap JS -->
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/validation.js"></script>
</body>
</html>
