<!DOCTYPE html>
<html lang="en" ng-app="skillBridgeApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillBridge Registration</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body ng-controller="RegistrationController">

<div class="login-card" ng-controller="RegistrationController">
  <div class="text-center mb-4">
    <img src="../assets/logo.png" alt="SkillBridge Logo" class="logo">
    <h3>SkillBridge</h3>
    <p class="text-muted">Create your account to start bridging skill gaps</p>
  </div>

  <!-- Registration Form -->
  <form class="needs-validation" novalidate ng-submit="register()">
    <div class="mb-3">
      <label for="fullName" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="fullName" ng-model="user.name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" ng-model="user.email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" ng-model="user.password" required>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" ng-model="user.confirmPassword" required>
    </div>
    <button type="submit" class="btn-skillbridge">Create Account</button>
  </form>

  <!-- Footer -->
  <div class="footer-link">
    <a href="#!/">Already have an account? Sign in</a>
  </div>
</div>

<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
